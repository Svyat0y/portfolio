<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Alexander Pop — Software Engineer building full-stack web apps with React, Node.js & TypeScript. Based in Valencia, Spain."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Alexander Pop — Software Engineer</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      og:url / og:image use relative paths for now — replace with the
      absolute deploy URL once this site has a domain (Netlify or custom),
      since social crawlers require absolute URLs to resolve a preview image.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Alexander Pop — Software Engineer" />
    <meta
      property="og:description"
      content="Full-stack web apps with React, Node.js & TypeScript. Based in Valencia, Spain."
    />
    <meta property="og:image" content="/og.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alexander Pop — Software Engineer" />
    <meta
      name="twitter:description"
      content="Full-stack web apps with React, Node.js & TypeScript. Based in Valencia, Spain."
    />
    <meta name="twitter:image" content="/og.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Static shadow of the React contact form, kept out of the visual layout.
      Netlify's build bot only detects <form data-netlify> tags present in the
      built HTML — it never sees forms rendered client-side by React. This
      lets it register the "contact" form; the real, visible form (rendered
      by ContactForm.tsx) posts to it via fetch. Fields must match exactly.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
